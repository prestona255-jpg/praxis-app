<script>
(function() {
  if (!('serviceWorker' in navigator)) return;
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(function(reg) {
        console.log('[Praxis SW] registered, scope: ' + reg.scope);
      })
      .catch(function(err) {
        console.warn('[Praxis SW] registration failed:', err);
      });
  });
})();
</script>
