<script>
(function() {
  if (!('serviceWorker' in navigator)) return;

  var refreshing = false;
  var hadController = !!navigator.serviceWorker.controller;

  function showUpdateBanner(reg) {
    if (document.getElementById('praxis-update-banner')) return;
    var bar = document.createElement('div');
    bar.id = 'praxis-update-banner';
    bar.style.cssText =
      'position:fixed;left:0;right:0;bottom:0;z-index:99999;' +
      'display:flex;align-items:center;justify-content:center;gap:12px;' +
      'padding:12px 16px;font-family:DM Sans,sans-serif;font-size:14px;' +
      'background:var(--color-surface);color:var(--ink);' +
      'border-top:1px solid var(--ink);';
    var msg = document.createElement('span');
    msg.textContent = 'A new version of Praxis is ready.';
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = 'Reload';
    btn.style.cssText =
      'font-family:DM Sans,sans-serif;font-size:14px;cursor:pointer;' +
      'padding:6px 14px;border-radius:6px;' +
      'background:var(--color-surface);color:var(--ink);' +
      'border:1px solid var(--ink);';
    btn.addEventListener('click', function() {
      if (reg.waiting) {
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      } else {
        location.reload();
      }
    });
    bar.appendChild(msg);
    bar.appendChild(btn);
    document.body.appendChild(bar);
  }

  function watchInstalling(reg, worker) {
    if (!worker) return;
    worker.addEventListener('statechange', function() {
      if (worker.state === 'installed' && navigator.serviceWorker.controller) {
        showUpdateBanner(reg);
      }
    });
  }

  navigator.serviceWorker.addEventListener('controllerchange', function() {
    if (refreshing) return;
    if (!hadController) return;
    refreshing = true;
    location.reload();
  });

  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(function(reg) {
        console.log('[Praxis SW] registered, scope: ' + reg.scope);
        if (reg.waiting && navigator.serviceWorker.controller) {
          showUpdateBanner(reg);
        }
        reg.addEventListener('updatefound', function() {
          watchInstalling(reg, reg.installing);
        });
        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible') {
            reg.update();
          } else if (document.visibilityState === 'hidden') {
            // P0: best-effort flush of any unsynced book adds before the tab
            // backgrounds or closes. Pushes to Firestore via saveState's
            // booksDirty chokepoint; no-op when nothing is pending. Does NOT
            // replace the SW update check above.
            if (typeof flushPendingBooks === 'function') { flushPendingBooks(); }
          }
        });
        // P0: pagehide backstop -- fires on actual unload / bfcache, where a
        // 'hidden' transition may already have passed. Same best-effort flush.
        window.addEventListener('pagehide', function() {
          if (typeof flushPendingBooks === 'function') { flushPendingBooks(); }
        });
      })
      .catch(function(err) {
        console.warn('[Praxis SW] registration failed:', err);
      });
  });
})();
</script>
