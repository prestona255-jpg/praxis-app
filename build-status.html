<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Praxis — Build Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F3EA; --paper-2:#FBF8F1; --ink:#2A2620; --ink-soft:#6B6256;
    --ink-faint:#A39A8A; --gold:#B89A62; --gold-deep:#947A45; --rule:#E4DCCB;
    --rule-soft:#EDE6D7; --shadow:rgba(64,52,30,.10);
    --serif:"Cormorant Garamond",Georgia,serif; --sans:"DM Sans",system-ui,sans-serif;
    --mono:"DM Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:radial-gradient(120% 80% at 50% -10%,var(--paper-2) 0%,var(--paper) 55%) fixed,var(--paper);
    color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;padding:48px 20px 96px}
  .wrap{max-width:760px;margin:0 auto}
  .masthead{text-align:center;margin-bottom:34px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:14px}
  .wordmark{font-family:var(--serif);font-weight:500;font-size:clamp(46px,9vw,72px);line-height:.92;margin:0}
  .wordmark em{font-style:italic;color:var(--gold-deep)}
  .tagline{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--ink-soft);margin-top:6px}
  .meter{margin:30px auto 8px;max-width:520px}
  .meter-top{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-bottom:8px}
  .meter-top b{color:var(--ink);font-weight:500}
  .meter-track{height:5px;border-radius:99px;background:var(--rule);overflow:hidden}
  .meter-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-deep));width:0;transition:width 1.1s cubic-bezier(.4,0,.1,1)}
  .legend{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 18px;margin:22px auto 40px;font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .dot{width:9px;height:9px;border-radius:99px;display:inline-block}
  .dot.done{background:var(--gold-deep)} .dot.unver{background:#C9912F} .dot.defer{background:var(--ink-faint)}
  .dot.revert{background:#B06A5C} .dot.plan{background:transparent;border:1.5px dotted var(--ink-faint)} .dot.open{background:transparent;border:1.5px solid var(--gold)}
  .stage{background:var(--paper-2);border:1px solid var(--rule);border-radius:14px;margin-bottom:12px;box-shadow:0 1px 0 var(--shadow);overflow:hidden;transition:border-color .25s,box-shadow .25s}
  .stage.is-open{border-color:var(--gold);box-shadow:0 6px 22px var(--shadow)}
  .stage-head{display:flex;align-items:center;gap:16px;padding:16px 18px;cursor:pointer;width:100%;background:none;border:0;text-align:left;font:inherit;color:inherit}
  .stage-head:focus-visible{outline:2px solid var(--gold);outline-offset:-3px}
  .emblem{position:relative;flex:0 0 auto;width:46px;height:46px;display:grid;place-items:center}
  .emblem .halo{position:absolute;inset:0;border-radius:99px;opacity:.16}
  .emblem svg{width:30px;height:30px;position:relative;z-index:1}
  .seal{position:absolute;right:-3px;bottom:-3px;width:19px;height:19px;border-radius:99px;background:var(--gold-deep);display:grid;place-items:center;z-index:2;box-shadow:0 0 0 2.5px var(--paper-2);transform:scale(0);transition:transform .4s cubic-bezier(.2,1.3,.4,1)}
  .seal svg{width:11px;height:11px;position:static}
  .stage[data-status="done"] .seal{transform:scale(1)}
  .stage-meta{flex:1 1 auto;min-width:0}
  .stage-kicker{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:1px}
  .stage-title{font-family:var(--serif);font-weight:500;font-size:25px;line-height:1.12;color:var(--ink)}
  .stage[data-status="reverted"] .stage-title{text-decoration:line-through;color:var(--ink-faint)}
  .stage-right{flex:0 0 auto;display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
  .frac b{color:var(--ink);font-weight:500}
  .chev{width:16px;height:16px;transition:transform .25s;color:var(--ink-faint)}
  .stage.is-open .chev{transform:rotate(90deg)}
  .subs{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .subs-inner{padding:2px 18px 16px 80px}
  .sub{display:flex;align-items:flex-start;gap:11px;padding:7px 0;border-top:1px solid var(--rule-soft)}
  .sub:first-child{border-top:0}
  .mark{flex:0 0 auto;width:17px;height:17px;border-radius:99px;margin-top:2px;display:grid;place-items:center;border:1.5px solid var(--rule)}
  .mark svg{width:10px;height:10px}
  .sub[data-s="done"] .mark{background:var(--gold-deep);border-color:var(--gold-deep);color:#fff}
  .sub[data-s="unver"] .mark{border-color:#C9912F;color:#C9912F}
  .sub[data-s="defer"] .mark{border-style:dashed;border-color:var(--ink-faint)}
  .sub[data-s="revert"] .mark{border-color:#B06A5C;color:#B06A5C}
  .sub[data-s="plan"] .mark{border-style:dotted;border-color:var(--ink-faint)}
  .sub-label{flex:1 1 auto;font-size:14px;color:var(--ink)}
  .sub[data-s="revert"] .sub-label{text-decoration:line-through;color:var(--ink-faint)}
  .sub-tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;padding:2px 7px;border-radius:99px;white-space:nowrap;margin-top:1px}
  .sub-tag.unver{color:#9A6E18;background:#F4E7C9} .sub-tag.defer{color:var(--ink-soft);background:var(--rule)}
  .sub-tag.revert{color:#8C4F42;background:#F0DED8} .sub-tag.plan{color:var(--ink-soft);background:var(--rule)}
  .audit{margin-top:34px;background:var(--paper-2);border:1px solid var(--gold);border-radius:16px;padding:22px 20px 8px;box-shadow:0 6px 26px var(--shadow)}
  .audit-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:4px}
  .audit-head h2{font-family:var(--serif);font-weight:600;font-size:27px;margin:0}
  .audit-head .phase{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-deep)}
  .audit-sub{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink-soft);margin:0 0 14px}
  .audit-item{display:flex;align-items:flex-start;gap:13px;padding:12px 2px;border-top:1px solid var(--rule-soft);cursor:pointer}
  .audit-item:first-of-type{border-top:0}
  .check{flex:0 0 auto;width:22px;height:22px;border-radius:99px;margin-top:1px;border:1.5px solid var(--gold);display:grid;place-items:center;color:#fff;transition:background .2s,transform .2s}
  .check svg{width:12px;height:12px;opacity:0;transition:opacity .2s}
  .audit-item.checked .check{background:var(--gold-deep);border-color:var(--gold-deep)}
  .audit-item.checked .check svg{opacity:1}
  .audit-item:active .check{transform:scale(.88)}
  .audit-body{flex:1 1 auto}
  .audit-title{font-size:15px;color:var(--ink)}
  .audit-item.checked .audit-title{color:var(--ink-faint);text-decoration:line-through}
  .audit-note{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
  .pri{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--gold-deep);padding:2px 7px;border-radius:99px;margin-left:8px;vertical-align:middle}
  .pri.defer{color:var(--ink-soft);background:var(--rule)}
  .footnote{text-align:center;margin-top:36px;font-family:var(--mono);font-size:11px;color:var(--ink-faint);line-height:1.7}
  @media (max-width:560px){body{padding:34px 14px 72px}.stage-title{font-size:22px}.subs-inner{padding-left:62px}.stage-right .frac{display:none}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div class="eyebrow">Refinement week · before launch</div>
    <h1 class="wordmark">Prax<em>i</em>s</h1>
    <div class="tagline">build status</div>
    <div class="meter">
      <div class="meter-top"><span>Stages complete</span><span><b id="mDone">0</b> / <span id="mTot">0</span></span></div>
      <div class="meter-track"><div class="meter-fill" id="mFill"></div></div>
    </div>
    <div class="legend">
      <span><i class="dot done"></i>shipped &amp; verified</span>
      <span><i class="dot unver"></i>shipped · unverified</span>
      <span><i class="dot defer"></i>deferred</span>
      <span><i class="dot revert"></i>reverted</span>
      <span><i class="dot plan"></i>planned</span>
      <span><i class="dot open"></i>open</span>
    </div>
  </header>
  <main id="stages"><p style="text-align:center;color:var(--ink-faint);font-family:var(--mono);font-size:12px">loading…</p></main>
  <section class="audit" id="audit"></section>
  <p class="footnote">checks read from <b>BUILD_STATE.md</b> — a stage ticks itself the moment its commit lands</p>
</div>
<script>
  // =====================================================================
  // build-status.html -- read-only Praxis build dashboard.
  // Renders the approved prototype design, made DATA-DRIVEN: every status
  // is read from docs/Checklist and Roadmap/BUILD_STATE.md at runtime.
  // NO status is stored in this page -- only presentation chrome (the
  // curated 12-card grouping, friendly labels, glyphs, colours). Each
  // curated sub-item binds to the exact BUILD_STATE.md ID it reads status
  // from; a true lookup miss renders "unknown" (never a guess); any .md
  // stage section not covered by the curated view surfaces in an
  // "Unmapped" bucket. ES3 only: var + function declarations, string
  // concatenation, two-argument .then for promises (no ES6 block scoping,
  // fat-arrow functions, template strings, or promise error/finalizer methods).
  // =====================================================================

  var GLYPH={
    hexagon:'<polygon points="50,5 90,27 90,73 50,95 10,73 10,27"/>',
    teardrop:'<path d="M50 6 C72 34 86 50 86 64 a36 36 0 1 1 -72 0 C14 50 28 34 50 6 Z"/>',
    star4:'<path d="M50 4 L60 40 96 50 60 60 50 96 40 60 4 50 40 40 Z"/>',
    pentagon:'<polygon points="50,5 93,37 77,90 23,90 7,37"/>',
    vesica:'<path d="M50 6 C80 30 80 70 50 94 C20 70 20 30 50 6 Z"/>',
    triangle:'<polygon points="50,9 91,87 9,87"/>',
    octagon:'<polygon points="31,7 69,7 93,31 93,69 69,93 31,93 7,69 7,31"/>',
    rhombus:'<polygon points="50,5 91,50 50,95 9,50"/>',
    squircle:'<rect x="9" y="9" width="82" height="82" rx="30"/>',
    star6:'<path d="M50 6 L66 34 98 34 74 56 84 90 50 70 16 90 26 56 2 34 34 34 Z"/>',
    egg:'<path d="M50 8 C72 8 84 36 84 58 a34 34 0 1 1 -68 0 C16 36 28 8 50 8 Z"/>',
    semicircle:'<path d="M10 88 a40 40 0 0 1 80 0 Z"/>'
  };

  // Presentation chrome ONLY. "id" is the BUILD_STATE.md row ID each sub
  // reads its status from. VU = the Visual-Uplift section key, used as the
  // documented section-header fallback for curated labels with no own row
  // (Trust 7c, Account 7d, Spotlight -- they shipped inside that section).
  var VU='Visual Uplift / Theme / Hybrid / Chrome / design-spec';
  var VIEW=[
    {n:"00",t:"Foundations",g:"vesica",c:"#7CC6DA",subs:[
      {label:"Yumi voice doctrine",id:"0"},
      {label:"Repo skeleton",id:"1.1"}]},
    {n:"01",t:"Skeleton, Auth & PWA",g:"hexagon",c:"#6FC9BC",subs:[
      {label:"App shell + routing",id:"1.1"},
      {label:"Auth",id:"1.3"},
      {label:"PWA / service worker",id:"1.5"}]},
    {n:"02",t:"Yumi — Brain & Memory",g:"teardrop",c:"#8FB8E8",subs:[
      {label:"Conversation brain",id:"2.1"},
      {label:"Memory + context snapshot",id:"2.7a/b-i"}]},
    {n:"03",t:"Notebook, Privacy & Books",g:"egg",c:"#C0A8E0",subs:[
      {label:"Notebook editor",id:"3.1"},
      {label:"Privacy model",id:"3.4a"},
      {label:"Books + covers",id:"3.5b"},
      {label:"Arcs (3.8 / 3.9)",id:"3.8.1"},
      {label:"Visual + Firestore (3.10)",id:"3.10a"}]},
    {n:"05",t:"Material World & Traditions",g:"rhombus",c:"#9BA4E8",subs:[
      {label:"Material surfaces (5.1)",id:"5.1"},
      {label:"Wheat-field (5.2)",id:"5.2"},
      {label:"Arcs seed (5.3)",id:"5.3"},
      {label:"Arc web-toggle (5.4)",id:"5.4 Stage 2b-1..3"},
      {label:"Tradition glyphs (5.6)",id:"5.6.1 (redo)"},
      {label:"5.7",id:"5.7.1"}]},
    {n:"06",t:"Scan, Vision & Onboarding",g:"octagon",c:"#AC9DE2",subs:[
      {label:"Shelf scan (6.1)",id:"6.1b"},
      {label:"Onboarding (6.2)",id:"6.2b / b.1"},
      {label:"“What Yumi sees”",id:"6.2c-pre / 6.2c"}]},
    {n:"07",t:"Constellation, Trust & Account",g:"star4",c:"#E8998D",subs:[
      {label:"Constellation (7.1 / 7.2)",id:"7.1B"},
      {label:"Trust (7c)",id:VU},
      {label:"Account (7d)",id:VU}]},
    {n:"08",t:"Interactivity & Spotlight",g:"pentagon",c:"#E8B45C",subs:[
      {label:"Constellation interactivity (8.1)",id:"8.1A"},
      {label:"Spotlight",id:VU}]},
    {n:"09",t:"Sub-theories & Luminous Workspace",g:"teardrop",c:"#F2A8C6",subs:[
      {label:"Model + surface (9.1–9.5)",id:"9.1"},
      {label:"Luminous workspace (9.6 a/b/c)",id:"9.6c"},
      {label:"Book-evidence layer (9.6d)",id:"9.6d"}]},
    {n:"14",t:"Sync & Isolation",g:"semicircle",c:"#8FD4B8",subs:[
      {label:"Sync (INF-1)",id:"INF-1 / 14.1a–c"},
      {label:"Isolation (INF-2)",id:"INF-2 / 14.2"},
      {label:"Account (INF-3)",id:"INF-3 / 14.3"},
      {label:"Service worker (INF-4)",id:"INF-4 / 14.4"}]},
    {n:"10",t:"Evidence & Citation",g:"star6",c:"#E89BB4",subs:[
      {label:"Attach affordances (10.1)",id:"10.1"},
      {label:"Inline preview (10.2)",id:"10.2"},
      {label:"External refId + title (10.3)",id:"10.3"},
      {label:"Read-only + Privacy Gate (10.4)",id:"10.4"},
      {label:"Citation UX (10.5.1–.7)",id:"10.5.1–10.5.7"},
      {label:"Writing-surface treatment (10.5.8)",id:"10.5.8"},
      {label:"Defect cleanup (10.5.9)",id:"10.5.9"}]}
  ];

  // Audit panel chrome (titles only -- the 8 items + their status come from §4).
  var AUDIT_TITLE="Pre-launch Audit", AUDIT_PHASE="current work", AUDIT_SUB="Eight items, strongest first.";

  var TICK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4 10-11"/></svg>';
  var DASH='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M6 12h12"/></svg>';

  function esc(s){s=''+s;s=s.replace(/&/g,'&amp;');s=s.replace(/</g,'&lt;');s=s.replace(/>/g,'&gt;');return s;}
  function trim(s){return (''+s).replace(/^\s+/,'').replace(/\s+$/,'');}
  function clean(s){if(s==null)return '';s=(''+s).replace(/\*\*/g,'');s=s.split(String.fromCharCode(96)).join('');return trim(s);}
  function isSeparator(line){return /^\|\s*:?-+/.test(line);}

  function glyphSVG(shape,color){return '<svg viewBox="0 0 100 100" fill="'+color+'">'+(GLYPH[shape]||GLYPH.hexagon)+'</svg>';}
  function markGlyph(s){if(s==="done"||s==="unver"||s==="revert")return TICK;if(s==="defer")return DASH;return "";}
  function tagFor(s){
    if(s==="unver")return '<span class="sub-tag unver">unverified</span>';
    if(s==="defer")return '<span class="sub-tag defer">deferred</span>';
    if(s==="revert")return '<span class="sub-tag revert">reverted</span>';
    if(s==="plan")return '<span class="sub-tag plan">planned</span>';
    if(s==="unknown")return '<span class="sub-tag plan">unknown</span>';
    return "";
  }

  // Map a raw BUILD_STATE.md status string -> a status key. Order matters:
  // SHIPPED-UNVERIFIED contains "VERIFIED", so test UNVERIFIED first.
  function mapStatus(raw){
    var s=(raw||'').toUpperCase();
    if(s.indexOf('UNVERIFIED')!==-1)return 'unver';
    if(s.indexOf('VERIFIED')!==-1)return 'done';
    if(s.indexOf('REVERTED')!==-1)return 'revert';
    if(s.indexOf('DEFERRED')!==-1)return 'defer';
    if(s.indexOf('PLANNED')!==-1)return 'plan';
    if(s.indexOf('OPEN')!==-1)return 'open';
    return 'unknown';
  }

  // Roll a set of sub-statuses up to one card/section status. Done wins over
  // a lone revert (so a stage with one reverted slice still reads shipped);
  // any unver/plan/defer/open demotes it. Mirrors the prototype's hand-set
  // card statuses and the "derive Stage 5.4 MIXED from its rows" rule.
  function deriveStatus(list){
    var has={},i;
    for(i=0;i<list.length;i++){has[list[i]]=true;}
    if(has.unver)return 'unver';
    if(has.plan)return 'plan';
    if(has.defer)return 'defer';
    if(has.open)return 'open';
    if(has.done)return 'done';
    if(has.revert)return 'revert';
    return 'unknown';
  }

  function lines(md){return (''+md).replace(/\r\n/g,'\n').split('\n');}
  function colAt(parts,i){return parts[i]!=null?clean(parts[i]):'';}

  // Parse §1 (## 1. .. ## 2.) into: statusById (row ID -> raw status),
  // ordered sections (each with derived status), and rowToSection.
  function parseStages(md){
    var ls=lines(md),i,started=false,cur=null;
    var statusById={},sections=[],rowToSection={};
    for(i=0;i<ls.length;i++){
      var ln=ls[i];
      if(ln.indexOf('## 1.')===0){started=true;continue;}
      if(started&&ln.indexOf('## 2.')===0)break;
      if(!started)continue;
      if(ln.indexOf('### ')===0){
        var hdr=ln.substring(4);
        var key=clean(hdr.split(' — ')[0]);
        cur={key:key,label:clean(hdr),rowIds:[],subs:[],status:'unknown'};
        sections.push(cur);
        continue;
      }
      if(ln.charAt(0)==='|'){
        if(isSeparator(ln))continue;
        var parts=ln.split('|');
        var id=colAt(parts,1),st=colAt(parts,3);
        if(id===''||id==='ID')continue;
        if(cur){
          statusById[id]=st;
          cur.rowIds.push(id);
          cur.subs.push(mapStatus(st));
          rowToSection[id]=cur.key;
        }
      }
    }
    for(i=0;i<sections.length;i++){sections[i].status=deriveStatus(sections[i].subs);}
    return {statusById:statusById,sections:sections,rowToSection:rowToSection};
  }

  // Parse §4 (## 4. .. next ##) into the audit array.
  // §4 is a GitHub task-list: "- [ ] **N.** Title · FLAGS — note". Checkbox =
  // open/done; **N.** = number; the FIRST " — " splits the title-segment from
  // the note (the note keeps its own em-dashes); the title-segment splits on
  // " · " into the clean title + status descriptors (TOP PRIORITY / DEFERRED).
  function parseAudit(md){
    var ls=lines(md),i,started=false,items=[],EM=' — ',MID=' · ';
    for(i=0;i<ls.length;i++){
      var ln=ls[i];
      if(ln.indexOf('## 4.')===0){started=true;continue;}
      if(started&&ln.indexOf('## ')===0)break;
      if(!started)continue;
      var m=/^\s*-\s*\[( |x|X)\]\s*(.*)$/.exec(ln);
      if(!m)continue;
      var done=m[1].toLowerCase()==='x';
      var body=m[2];
      var nm=/^\*{0,2}(\d+)\.\*{0,2}\s*/.exec(body);
      var num='';
      if(nm){num=nm[1];body=body.substring(nm[0].length);}
      var sep=body.indexOf(EM);
      var titleSeg=sep===-1?body:body.substring(0,sep);
      var note=sep===-1?'':body.substring(sep+EM.length);
      var segs=titleSeg.split(MID);
      var descr=segs.slice(1).join(MID).toUpperCase();
      items.push({
        num:num,
        bug:clean(segs[0]),
        note:clean(note),
        priority:descr.indexOf('TOP PRIORITY')!==-1,
        deferred:descr.indexOf('DEFERRED')!==-1,
        done:done
      });
    }
    return items;
  }

  function findSection(sections,key){var i;for(i=0;i<sections.length;i++){if(sections[i].key===key)return sections[i];}return null;}

  // A curated sub reads status from its bound row ID; else (documented
  // fallback) from a section header by key; else "unknown" -- never a guess.
  function resolveSub(parsed,id){
    if(Object.prototype.hasOwnProperty.call(parsed.statusById,id))return mapStatus(parsed.statusById[id]);
    var sec=findSection(parsed.sections,id);
    if(sec)return sec.status;
    return 'unknown';
  }

  function stageCard(num,title,glyph,color,cardStatus,done,total,subHTML){
    return '<div class="stage" data-status="'+esc(cardStatus)+'">'+
      '<button class="stage-head" aria-expanded="false">'+
        '<span class="emblem"><span class="halo" style="background:'+color+'"></span>'+glyphSVG(glyph,color)+'<span class="seal">'+TICK+'</span></span>'+
        '<span class="stage-meta"><span class="stage-kicker">'+esc(num)+'</span><span class="stage-title">'+esc(title)+'</span></span>'+
        '<span class="stage-right"><span class="frac"><b>'+done+'</b>/'+total+'</span>'+
          '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>'+
        '</span>'+
      '</button>'+
      '<div class="subs"><div class="subs-inner">'+subHTML+'</div></div>'+
    '</div>';
  }

  function subRow(label,key){
    return '<div class="sub" data-s="'+esc(key)+'"><span class="mark">'+markGlyph(key)+'</span>'+
      '<span class="sub-label">'+esc(label)+'</span>'+tagFor(key)+'</div>';
  }

  // Render the curated cards; returns coverage + per-card statuses + counts.
  function renderStages(parsed){
    var html="",i,j,covered={},statuses=[],subCount=0;
    for(i=0;i<VIEW.length;i++){
      var st=VIEW[i],resolved=[],total=st.subs.length,done=0,subHTML="";
      for(j=0;j<st.subs.length;j++){
        var su=st.subs[j],key=resolveSub(parsed,su.id);
        resolved.push(key);
        subCount++;
        if(key==="done")done++;
        if(Object.prototype.hasOwnProperty.call(parsed.rowToSection,su.id))covered[parsed.rowToSection[su.id]]=true;
        else if(findSection(parsed.sections,su.id))covered[su.id]=true;
        subHTML+=subRow(su.label,key);
      }
      var cardStatus=deriveStatus(resolved);
      statuses.push(cardStatus);
      html+=stageCard("Stage "+st.n,st.t,st.g,st.c,cardStatus,done,total,subHTML);
    }
    document.getElementById("stages").innerHTML=html;
    return {covered:covered,statuses:statuses,subCount:subCount};
  }

  // Anti-drift: any §1 section the curated view did not cover renders here,
  // using the .md's own label + derived status. Nothing silently dropped.
  function renderUnmapped(parsed,covered){
    var i,j,missing=[];
    for(i=0;i<parsed.sections.length;i++){if(!covered[parsed.sections[i].key])missing.push(parsed.sections[i]);}
    if(missing.length===0)return 0;
    var html="";
    for(i=0;i<missing.length;i++){
      var sec=missing[i],subHTML="",done=0;
      for(j=0;j<sec.rowIds.length;j++){
        var key=mapStatus(parsed.statusById[sec.rowIds[j]]);
        if(key==="done")done++;
        subHTML+=subRow(sec.rowIds[j],key);
      }
      html+=stageCard("Unmapped — added since this view was configured",sec.label,"squircle","#A39A8A",sec.status,done,sec.rowIds.length,subHTML);
    }
    var host=document.getElementById("stages");
    host.innerHTML=host.innerHTML+html;
    return missing.length;
  }

  function bindAccordions(){
    var heads=document.getElementById("stages").querySelectorAll(".stage-head"),h;
    for(h=0;h<heads.length;h++){
      heads[h].addEventListener("click",function(){
        var stage=this.parentNode,panel=stage.querySelector(".subs"),open=stage.classList.toggle("is-open");
        this.setAttribute("aria-expanded",open?"true":"false");
        panel.style.maxHeight=open?(panel.firstChild.scrollHeight+8)+"px":"0px";
      });
    }
  }

  // READ-ONLY audit panel. No click/keydown toggle -- a click must not fake
  // a state change. Ticking happens later by editing §4 on GitHub.
  function renderAudit(items){
    var html='<div class="audit-head"><h2>'+esc(AUDIT_TITLE)+'</h2><span class="phase">'+esc(AUDIT_PHASE)+'</span></div><p class="audit-sub">'+esc(AUDIT_SUB)+'</p>',i;
    for(i=0;i<items.length;i++){
      var it=items[i],cls=it.done?' checked':'';
      html+='<div class="audit-item'+cls+'" role="checkbox" aria-checked="'+(it.done?'true':'false')+'">'+
        '<span class="check">'+TICK+'</span>'+
        '<span class="audit-body"><span class="audit-title">'+esc(it.num)+'. '+esc(it.bug)+(it.priority?'<span class="pri">top priority</span>':'')+(it.deferred?'<span class="pri defer">deferred</span>':'')+'</span>'+
        (it.note?'<span class="audit-note">'+esc(it.note)+'</span>':'')+'</span></div>';
    }
    document.getElementById("audit").innerHTML=html;
  }

  function renderMeter(statuses){
    var done=0,i;
    for(i=0;i<statuses.length;i++){if(statuses[i]==="done")done++;}
    document.getElementById("mDone").textContent=done;
    document.getElementById("mTot").textContent=statuses.length;
    setTimeout(function(){
      document.getElementById("mFill").style.width=(statuses.length?(done/statuses.length*100):0)+"%";
    },120);
  }

  function showError(){
    var msg=(location.protocol==='file:')
      ? 'Open this from praxis-reading.netlify.app/build-status.html — a local file can’t load the data.'
      : 'Couldn’t load build status — the source file didn’t respond';
    document.getElementById("stages").innerHTML='<p style="text-align:center;color:var(--ink-soft);font-family:var(--mono);font-size:13px">'+esc(msg)+'</p>';
    document.getElementById("audit").innerHTML='';
  }

  function render(md){
    var parsed=parseStages(md);
    var r=renderStages(parsed);
    var unmapped=renderUnmapped(parsed,r.covered);
    bindAccordions();
    renderMeter(r.statuses);
    var audit=parseAudit(md);
    renderAudit(audit);
    if(window.console&&console.log){
      console.log("build-status: cards="+VIEW.length+" subs="+r.subCount+" audit="+audit.length+
        " sections="+parsed.sections.length+" unmapped="+unmapped);
    }
  }

  function boot(){
    if(location.protocol==='file:'){showError();return;}
    var url='docs/Checklist and Roadmap/BUILD_STATE.md'.replace(/ /g,'%20')+'?t='+(new Date()).getTime();
    fetch(url,{cache:'no-store'}).then(function(resp){
      if(!resp||!resp.ok){showError();return;}
      return resp.text().then(function(md){
        try{render(md);}catch(e){if(window.console&&console.error){console.error(e);}showError();}
      },function(){showError();});
    },function(){showError();});
  }

  boot();
</script>
</body>
</html>
