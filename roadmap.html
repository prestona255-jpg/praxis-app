<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Praxis Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Literary palette — header, stage cards, body text */
  --ink:            #1f1a14;
  --ink-2:          #3a3026;
  --ink-3:          #6a5e51;
  --ink-4:          #8a7f72;
  --gold:           #b88a3a;
  --gold-soft:      #d4b876;
  --gold-deep:      #8b6a26;
  --br-deep:        #5a3f24;
  --br-mid:         #8a6d4a;
  --parchment:      #f5ede0;
  --parchment-2:    #ede3d2;
  --parchment-3:    #e3d6bf;
  --border:         #c8b89a;
  --border-soft:    #d8cab0;

  /* Tool palette — dashboard, timeline, matrix */
  --tool-bg:        #1c1812;
  --tool-bg-2:      #25201a;
  --tool-bg-3:      #2f2a22;
  --tool-line:      #3d3528;
  --tool-line-2:    #4a4135;
  --tool-fg:        #e8dfc9;
  --tool-fg-2:      #b9ad94;
  --tool-fg-3:      #847a66;
  --tool-accent:    #d4a04a;
  --tool-accent-2:  #f0c878;

  /* Status — high saturation gap so done vs not-done reads instantly */
  --status-not-started: #8a7f72;
  --status-in-progress: #e09a30;
  --status-shipped:     #5a8c4a;
  --status-proven:      #2d6b32;
  --status-deferred:    #6a5e51;

  /* Status (bright variants for dark surfaces) */
  --status-not-started-b: #a89684;
  --status-in-progress-b: #f0b450;
  --status-shipped-b:     #7aaf68;
  --status-proven-b:      #5fa05a;
  --status-deferred-b:    #8a7f72;

  /* Elevation */
  --shadow-1: 0 1px 2px rgba(30,20,10,0.04), 0 2px 6px rgba(30,20,10,0.04);
  --shadow-2: 0 2px 4px rgba(30,20,10,0.06), 0 8px 20px rgba(30,20,10,0.08);
  --shadow-3: 0 4px 8px rgba(30,20,10,0.08), 0 16px 40px rgba(30,20,10,0.10);
  --shadow-tool: 0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.5);
  --shadow-tool-lift: 0 1px 0 rgba(255,255,255,0.05) inset, 0 4px 16px rgba(0,0,0,0.4);

  --display: 'Cormorant Garamond', Georgia, serif;
  --body: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', 'SF Mono', Menlo, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--parchment);
  color: var(--ink);
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(184,138,58,0.05), transparent 55%),
    radial-gradient(circle at 85% 80%, rgba(90,63,36,0.04), transparent 55%);
}

#app { position: relative; z-index: 1; }

a { color: var(--br-deep); text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 3px; }
a:hover { text-decoration-color: var(--gold); }

button {
  font-family: var(--body);
  font-size: 14px;
  cursor: pointer;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 8px 16px;
  border-radius: 4px;
  transition: all 0.15s ease;
}
button:hover { border-color: var(--gold); background: var(--parchment-2); }
button:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

/* ====================  HEADER (literary)  ==================== */

.header {
  padding: 56px 48px 36px;
  border-bottom: 1px solid var(--border);
  background: var(--parchment);
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  left: 48px;
  right: 48px;
  bottom: -1px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
  opacity: 0.35;
}
.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 32px;
  flex-wrap: wrap;
}
.title-block { flex: 1; min-width: 280px; }
.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin: 0 0 14px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: '';
  width: 24px;
  height: 1px;
  background: var(--gold);
}
.title {
  font-family: var(--display);
  font-weight: 500;
  font-size: 64px;
  line-height: 0.95;
  margin: 0;
  color: var(--ink);
  letter-spacing: -0.015em;
}
.subtitle {
  font-family: var(--display);
  font-style: italic;
  font-weight: 400;
  font-size: 19px;
  color: var(--ink-3);
  margin: 14px 0 0;
  max-width: 640px;
  line-height: 1.4;
}
.meta-row {
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  margin-top: 20px;
}
.meta-row span { display: inline-flex; align-items: baseline; gap: 6px; }
.meta-row span strong { color: var(--ink); font-weight: 500; }
.meta-row span::before {
  content: '';
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
  margin-right: 4px;
  display: inline-block;
  align-self: center;
}

/* ====================  TOOLBAR  ==================== */

.toolbar {
  position: sticky;
  top: 0;
  z-index: 50;
  border-bottom: 1px solid var(--border);
  padding: 14px 48px;
  background: rgba(245,237,224,0.94);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.toolbar-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.view-switcher {
  display: inline-flex;
  background: var(--parchment-2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 3px;
  box-shadow: var(--shadow-1);
}
.view-switcher button {
  border: none;
  padding: 7px 16px;
  border-radius: 999px;
  font-family: var(--body);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
  background: transparent;
}
.view-switcher button.active {
  background: var(--ink);
  color: var(--parchment);
  box-shadow: var(--shadow-1);
}
.view-switcher button:hover:not(.active) {
  color: var(--ink);
  background: rgba(184,138,58,0.10);
}

.filter-select, .search-input {
  font-family: var(--body);
  font-size: 13px;
  background: var(--parchment-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 12px;
  color: var(--ink);
}
.search-input { min-width: 220px; flex: 1; max-width: 360px; }
.search-input::placeholder { color: var(--ink-4); font-style: italic; }
.filter-select:focus, .search-input:focus { outline: 2px solid var(--gold); outline-offset: 1px; border-color: var(--gold); }

.main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 40px 48px 80px;
}

.view { display: none; }
.view.active { display: block; }

/* ====================  DASHBOARD (dense tool)  ==================== */

.dash-hero {
  background:
    linear-gradient(135deg, var(--tool-bg-2), var(--tool-bg)),
    radial-gradient(circle at 80% 20%, rgba(212,160,74,0.08), transparent 50%);
  border: 1px solid var(--tool-line);
  border-radius: 8px;
  padding: 48px 56px;
  margin-bottom: 36px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 32px;
  align-items: center;
  box-shadow: var(--shadow-3);
  position: relative;
  overflow: hidden;
}
.dash-hero::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(240,200,120,0.4), transparent);
}
.dash-hero::after {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 320px;
  height: 320px;
  background: radial-gradient(circle, rgba(212,160,74,0.15), transparent 70%);
  pointer-events: none;
}
.dash-hero > div { position: relative; z-index: 1; }

.dash-bignum {
  font-family: var(--display);
  font-weight: 500;
  font-size: 96px;
  line-height: 0.9;
  color: var(--tool-accent-2);
  letter-spacing: -0.025em;
}
.dash-bignum .of {
  font-size: 28px;
  color: var(--tool-fg-2);
  font-style: italic;
  font-weight: 400;
  letter-spacing: 0;
}
.dash-hero-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--tool-fg-3);
  margin-top: 12px;
}
.dash-hero-label::before {
  content: '— ';
  color: var(--tool-accent);
}

.dash-cta {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: stretch;
}
.dash-cta button {
  font-family: var(--display);
  font-weight: 500;
  font-size: 19px;
  padding: 16px 32px;
  background: var(--tool-accent);
  color: var(--ink);
  border: 1px solid var(--tool-accent-2);
  letter-spacing: -0.005em;
  box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 4px 12px rgba(212,160,74,0.25);
  transition: all 0.18s ease;
}
.dash-cta button:hover {
  background: var(--tool-accent-2);
  transform: translateY(-1px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.3) inset, 0 6px 16px rgba(212,160,74,0.35);
}

.dash-section-title {
  font-family: var(--display);
  font-weight: 500;
  font-size: 32px;
  margin: 40px 0 18px;
  color: var(--ink);
  letter-spacing: -0.01em;
  display: flex;
  align-items: baseline;
  gap: 14px;
}
.dash-section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
  position: relative;
  top: -8px;
}

.dash-bars {
  background: var(--tool-bg);
  border: 1px solid var(--tool-line);
  border-radius: 8px;
  padding: 8px 28px;
  box-shadow: var(--shadow-2);
}

.stage-bar-row {
  display: grid;
  grid-template-columns: 240px 1fr 110px;
  gap: 24px;
  align-items: center;
  padding: 18px 0;
  border-bottom: 1px solid var(--tool-line);
}
.stage-bar-row:last-child { border-bottom: none; }
.stage-bar-name {
  font-family: var(--display);
  font-weight: 500;
  font-size: 19px;
  color: var(--tool-fg);
  letter-spacing: -0.005em;
}
.stage-bar-name .num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--tool-fg-3);
  letter-spacing: 0.16em;
  display: block;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.stage-bar-track {
  height: 10px;
  background: var(--tool-bg-3);
  border-radius: 999px;
  overflow: hidden;
  display: flex;
  border: 1px solid var(--tool-line);
  position: relative;
}
.stage-bar-segment { height: 100%; transition: width 0.3s ease; }
.stage-bar-count {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--tool-fg-2);
  text-align: right;
  letter-spacing: 0.04em;
}
.stage-bar-count strong {
  color: var(--tool-accent-2);
  font-weight: 500;
}

.dash-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 32px;
}
.dash-card {
  background: var(--tool-bg-2);
  border: 1px solid var(--tool-line);
  border-radius: 8px;
  padding: 28px;
  box-shadow: var(--shadow-2);
  position: relative;
  overflow: hidden;
}
.dash-card.active {
  border-left: 3px solid var(--tool-accent);
  background:
    linear-gradient(90deg, rgba(212,160,74,0.06), transparent 30%),
    var(--tool-bg-2);
}
.dash-card.dim { opacity: 0.65; }
.dash-card-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--tool-fg-3);
  margin: 0 0 12px;
}
.dash-card.active .dash-card-label { color: var(--tool-accent); }
.dash-card-title {
  font-family: var(--display);
  font-weight: 500;
  font-size: 24px;
  margin: 0 0 10px;
  color: var(--tool-fg);
  letter-spacing: -0.005em;
  line-height: 1.2;
}
.dash-card-meta {
  font-family: var(--body);
  font-size: 13px;
  color: var(--tool-fg-2);
  line-height: 1.5;
}
.dash-card-bignum {
  font-family: var(--display);
  font-weight: 500;
  font-size: 56px;
  color: var(--tool-accent-2);
  line-height: 1;
  margin-top: 8px;
  letter-spacing: -0.02em;
}

/* ====================  STAGES (literary)  ==================== */

.stage-card {
  background: var(--parchment-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 28px;
  box-shadow: var(--shadow-1);
  overflow: hidden;
  transition: all 0.2s;
  position: relative;
}
.stage-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--border);
  transition: background 0.2s;
}
.stage-card.active {
  box-shadow: var(--shadow-2);
}
.stage-card.active::before { background: var(--gold); }
.stage-card.shipped::before { background: var(--status-shipped); opacity: 0.6; }
.stage-card.proven::before { background: var(--status-proven); opacity: 0.6; }
.stage-card.shipped, .stage-card.proven { opacity: 0.94; }

.stage-head {
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 24px;
  align-items: center;
  padding: 26px 36px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.stage-head:hover { background: rgba(184,138,58,0.04); }
.stage-num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  color: var(--gold-deep);
  text-transform: uppercase;
  font-weight: 500;
}
.stage-name {
  font-family: var(--display);
  font-weight: 500;
  font-size: 34px;
  color: var(--ink);
  letter-spacing: -0.012em;
  line-height: 1.05;
}
.stage-purpose {
  font-family: var(--display);
  font-style: italic;
  font-size: 16px;
  color: var(--ink-3);
  margin-top: 6px;
  line-height: 1.45;
  max-width: 720px;
}
.stage-progress-mini {
  width: 110px;
  height: 6px;
  background: var(--parchment-3);
  border-radius: 999px;
  display: flex;
  overflow: hidden;
  border: 1px solid var(--border-soft);
}
.stage-progress-mini > div { height: 100%; }
.chevron {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink-3);
  transition: transform 0.2s;
  display: inline-block;
  width: 14px;
}
.stage-card.expanded .chevron, .substage.expanded .chevron, .prompt-block.expanded .chevron {
  transform: rotate(90deg);
}

.stage-body {
  display: none;
  padding: 0 36px 36px;
  border-top: 1px solid var(--border-soft);
}
.stage-card.expanded .stage-body { display: block; }

.stage-summary {
  font-family: var(--display);
  font-size: 18px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 28px 0 24px;
  font-style: italic;
  max-width: 780px;
}
.stage-meta-block {
  background: var(--parchment);
  border: 1px solid var(--border-soft);
  border-radius: 4px;
  padding: 18px 22px;
  margin-bottom: 16px;
}
.stage-meta-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin: 0 0 10px;
  font-weight: 500;
}
.stage-meta-block ul, .stage-meta-block p {
  margin: 0;
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.6;
}
.stage-meta-block ul { padding-left: 20px; }
.stage-meta-block li { margin-bottom: 5px; }

.substage-list { display: flex; flex-direction: column; gap: 14px; margin-top: 24px; }

/* Status badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 5px 11px;
  border-radius: 999px;
  white-space: nowrap;
  background: var(--parchment-3);
  color: var(--ink);
  border: 1px solid var(--border);
  font-weight: 500;
}
.status-badge::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--status-not-started);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.4) inset;
}
.status-badge.status-not-started::before { background: var(--status-not-started); }
.status-badge.status-in-progress::before { background: var(--status-in-progress); box-shadow: 0 0 8px rgba(224,154,48,0.5), 0 0 0 2px rgba(255,255,255,0.4) inset; }
.status-badge.status-shipped::before { background: var(--status-shipped); }
.status-badge.status-proven::before { background: var(--status-proven); box-shadow: 0 0 0 2px rgba(255,255,255,0.4) inset; }
.status-badge.status-deferred::before { background: var(--status-deferred); }
.status-badge.status-deferred { font-style: italic; color: var(--status-deferred); }
.status-badge.status-proven { background: rgba(45,107,50,0.10); border-color: rgba(45,107,50,0.3); color: var(--status-proven); }
.status-badge.status-shipped { background: rgba(90,140,74,0.10); border-color: rgba(90,140,74,0.3); color: var(--status-shipped); }
.status-badge.status-in-progress { background: rgba(224,154,48,0.12); border-color: rgba(224,154,48,0.35); color: #8a5a14; }

/* Substage card */
.substage {
  background: var(--parchment);
  border: 1px solid var(--border);
  border-radius: 5px;
  overflow: hidden;
  transition: box-shadow 0.15s;
}
.substage:hover { box-shadow: var(--shadow-1); }
.substage.deferred { font-style: italic; color: var(--status-deferred); }
.substage.expanded { box-shadow: var(--shadow-2); }

.substage-head {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 18px;
  align-items: center;
  padding: 18px 24px;
  cursor: pointer;
  user-select: none;
}
.substage-head:hover { background: var(--parchment-2); }
.substage-id {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--gold-deep);
  letter-spacing: 0.14em;
  font-weight: 500;
}
.substage-name {
  font-family: var(--display);
  font-weight: 500;
  font-size: 24px;
  color: var(--ink);
  margin-top: 3px;
  line-height: 1.2;
  letter-spacing: -0.005em;
}
.substage-checks {
  display: flex;
  gap: 16px;
  align-items: center;
}
.check-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  cursor: pointer;
  font-weight: 500;
}
.check-pill input[type="checkbox"] {
  width: 15px;
  height: 15px;
  accent-color: var(--gold);
  cursor: pointer;
}

.substage-body {
  display: none;
  padding: 4px 24px 26px;
  border-top: 1px solid var(--border-soft);
  background: linear-gradient(180deg, var(--parchment-2) 0%, var(--parchment) 60px);
}
.substage.expanded .substage-body { display: block; }

.field-block { margin-top: 20px; }
.field-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin: 0 0 8px;
  font-weight: 500;
}
.field-value { font-size: 14px; color: var(--ink-2); line-height: 1.6; }
.field-value p { margin: 0 0 6px; }
.field-value ul { margin: 0; padding-left: 22px; }
.field-value li { margin-bottom: 5px; }

.field-files {
  font-family: var(--mono);
  font-size: 12.5px;
  background: var(--parchment-3);
  border: 1px solid var(--border-soft);
  border-radius: 4px;

}

function getManual(subId) {

}
function setManual(subId, v) {
  sv('praxis_roadmap_manual_' + subId, !!v);

function getView() {

}

}
function getExpandedStages() {
  return ls('praxis_roadmap_expanded_stages', null);
}
function setExpandedStages(arr) {
  sv('praxis_roadmap_expanded_stages', arr);
}

function computeSubstageStatus(sub) {
  if (sub.deferred) return 'deferred';
  var manual = getManual(sub.id);
  var audit = getAudit(sub.id);
  if (manual && audit) return 'proven';
  if (manual) return 'shipped';
  if (sub.inProgress) return 'in-progress';
  return 'not-started';
}

function computeStageProgress(stage) {
  if (!stage.substages || stage.substages.length === 0) {
    return { proven: 0, shipped: 0, inProgress: 0, notStarted: 0, deferred: 0, total: 0 };
  }
  var p = 0, s = 0, ip = 0, ns = 0, d = 0;
  var i;
  for (i = 0; i < stage.substages.length; i++) {
    var st = computeSubstageStatus(stage.substages[i]);
    if (st === 'proven') p++;
    else if (st === 'shipped') s++;
    else if (st === 'in-progress') ip++;
    else if (st === 'deferred') d++;
    else ns++;
  }
  return {
    proven: p,
    shipped: s,
    inProgress: ip,
    notStarted: ns,
    deferred: d,
    total: stage.substages.length
  };
}

function totalProgress() {
  var totalSub = 0;
  var provenSub = 0;
  var i;
  for (i = 0; i < STAGES.length; i++) {
    var prog = computeStageProgress(STAGES[i]);
    totalSub += prog.total;
    provenSub += prog.proven;
  }
  return { proven: provenSub, total: totalSub };
}

function statusColorVar(status) {
  if (status === 'proven') return 'var(--status-proven)';
  if (status === 'shipped') return 'var(--status-shipped)';
  if (status === 'in-progress') return 'var(--status-in-progress)';
  if (status === 'deferred') return 'var(--status-deferred)';
  return 'var(--status-not-started)';
}

function statusLabel(status) {
  if (status === 'proven') return 'Proven';
  if (status === 'shipped') return 'Shipped';
  if (status === 'in-progress') return 'In progress';
  if (status === 'deferred') return 'Deferred';
  return 'Not started';
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(s) { return escapeHtml(s); }

function findStageById(id) {
  var i;
  for (i = 0; i < STAGES.length; i++) {
    if (STAGES[i].id === id) return STAGES[i];
  }
  return null;
}

function findSubstageById(id) {
  var i, j;
  for (i = 0; i < STAGES.length; i++) {
    var subs = STAGES[i].substages || [];
    for (j = 0; j < subs.length; j++) {
      if (subs[j].id === id) return { stage: STAGES[i], sub: subs[j] };
    }
  }
  return null;
}

function findSubsystemById(id) {
  var i;
  for (i = 0; i < SUBSYSTEMS.length; i++) {
    if (SUBSYSTEMS[i].id === id) return SUBSYSTEMS[i];
  }
  return null;
}

// Decide whether a sub-stage has enough operational detail to merit a
// fully-assembled prompt. Eight Stage 2 sub-stages currently qualify;
// skeleton tentative sub-stages (Stage 2.5, 3, 4) do not. The signal is
// the presence of acceptance criteria and evidence — both load-bearing
// for a runnable prompt.
function isSubFullyDeveloped(sub) {
  if (!sub) return false;
  if (!sub.acceptance || sub.acceptance.length === 0) return false;
  if (!sub.evidence || sub.evidence.length === 0) return false;
  return true;
}

// Assemble the full operational prompt from a sub-stage's card data.
// Sections appear in the order an agent needs them: identity →
// dependencies → purpose → non-goals → files → acceptance → evidence
// → rollback → risks → staging instructions. The promptSkeleton field
// supplies the staging tail; everything else is sourced from the card,
// so editing the card edits the prompt with no drift.
function buildFullPrompt(sub, stage) {
  if (!isSubFullyDeveloped(sub)) {
    // Skeleton fallback: just the raw skeleton text, since that's all there is.
    return sub.promptSkeleton || '';
  }
  var lines = [];
  var i;
  var subsysNames = [];
  if (sub.subsystems && sub.subsystems.length) {
    for (i = 0; i < sub.subsystems.length; i++) {
      var sys = findSubsystemById(sub.subsystems[i]);
      subsysNames.push(sys ? sys.name : sub.subsystems[i]);
    }
  }

  lines.push('=== ' + (stage ? stage.num : '') + ' · ' + (sub.num || sub.id) + ' — ' + sub.name + ' ===');
  lines.push('');
  lines.push('DEPENDENCIES (must be satisfied before starting):');
  lines.push('  ' + (sub.depConfirm || '—'));
  lines.push('');
  lines.push('PURPOSE:');
  lines.push('  ' + sub.purpose);
  lines.push('');
  if (sub.scope && sub.scope.length) {
    lines.push('SCOPE:');
    for (i = 0; i < sub.scope.length; i++) {
      lines.push('  - ' + sub.scope[i]);
    }
    lines.push('');
  }
  if (sub.nonGoals && sub.nonGoals.length) {
    lines.push('NON-GOALS (do not touch):');
    for (i = 0; i < sub.nonGoals.length; i++) {
      lines.push('  - ' + sub.nonGoals[i]);
    }
    lines.push('');
  }
  if (subsysNames.length) {
    lines.push('SUBSYSTEMS INVOLVED:');
    lines.push('  ' + subsysNames.join(', '));
    lines.push('');
  }
  if (sub.files && sub.files.length) {
    lines.push('FILES LIKELY TO CHANGE:');
    for (i = 0; i < sub.files.length; i++) {
      lines.push('  - ' + sub.files[i]);
    }
    lines.push('');
  }
  if (sub.acceptance && sub.acceptance.length) {
    lines.push('ACCEPTANCE CRITERIA:');
    for (i = 0; i < sub.acceptance.length; i++) {
      lines.push('  - ' + sub.acceptance[i]);
    }
    lines.push('');
  }
  if (sub.evidence && sub.evidence.length) {
    lines.push('EVIDENCE (every check must pass — do not accept self-reports):');
    for (i = 0; i < sub.evidence.length; i++) {
      lines.push('  - ' + sub.evidence[i]);
    }
    lines.push('');
  }
  if (sub.rollback) {
    lines.push('ROLLBACK / CLEANUP:');
    lines.push('  ' + sub.rollback);
    lines.push('');
  }
  if (sub.risks && sub.risks.length) {
    lines.push('RISKS AND FAILURE MODES:');
    for (i = 0; i < sub.risks.length; i++) {
      lines.push('  - ' + sub.risks[i]);
    }
    lines.push('');
  }
  lines.push('CONVENTIONS (Praxis vanilla-JS, non-negotiable):');
  lines.push('  - var and function only. No const, let, arrow functions, classes, or template literals.');
  lines.push('  - String concatenation only.');
  lines.push('  - CSS variables only — no hardcoded hex.');
  lines.push('  - localStorage via ls(k, d) / sv(k, v) wrappers.');
  lines.push('  - File load order: state → integrations → yumi-brain → arcs → voice-input → yumi-ui → views → app.');
  lines.push('');
  if (sub.promptSkeleton) {
    lines.push('STAGING INSTRUCTIONS:');
    var skLines = sub.promptSkeleton.split('\n');
    for (i = 0; i < skLines.length; i++) {
      lines.push(skLines[i]);
    }
    lines.push('');
  }
  lines.push('VERIFICATION DISCIPLINE:');
  lines.push('  Do not declare PASS without independent evidence. Run every check in the EVIDENCE block.');
  lines.push('  If any check fails: revert the patch unless the failure is pre-existing drift unrelated to this work.');
  lines.push('  Report each check with its actual output, not a self-narrated summary.');
  return lines.join('\n');
}

function tsString(iso) {
  if (!iso) return '';
  try {
    var d = new Date(iso);
    var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    var hh = d.getHours();
    var mm = d.getMinutes();
    var pad2 = function(n) { return n < 10 ? '0' + n : '' + n; };
    return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + ' · ' + pad2(hh) + ':' + pad2(mm);
  } catch (e) { return ''; }
}

function renderDashboard() {
  var tp = totalProgress();
  var html = '';

  html += '<section class="dash-hero">';
  html += '  <div>';
  html += '    <div class="dash-bignum">' + tp.proven + ' <span class="of">of ' + tp.total + ' Proven</span></div>';
  html += '    <div class="dash-hero-label">Sub-stages across all stages</div>';
  html += '  </div>';
  html += '  <div class="dash-cta">';
  // Find active stage
  var activeStage = null;
  var i;
  for (i = 0; i < STAGES.length; i++) { if (STAGES[i].active) { activeStage = STAGES[i]; break; } }
  if (activeStage) {
    html += '    <button data-jump-stage="' + escapeAttr(activeStage.id) + '">Continue to ' + escapeHtml(activeStage.num) + '</button>';
  }
  html += '  </div>';
  html += '</section>';

  // Stage progress bars
  html += '<h2 class="dash-section-title">Stages at a glance</h2>';
  html += '<div>';
  for (i = 0; i < STAGES.length; i++) {
    var stage = STAGES[i];
    var prog = computeStageProgress(stage);
    var totalForBar = prog.total > 0 ? prog.total : 1;
    var pctProven = (prog.proven / totalForBar) * 100;
    var pctShipped = (prog.shipped / totalForBar) * 100;
    var pctInProg = (prog.inProgress / totalForBar) * 100;
    var pctDeferred = (prog.deferred / totalForBar) * 100;

    html += '<div class="stage-bar-row">';
    html += '  <div class="stage-bar-name">';
    html += '    <span class="num">' + escapeHtml(stage.num) + '</span>';
    html += escapeHtml(stage.name);
    html += '  </div>';
    html += '  <div class="stage-bar-track">';
    if (prog.total === 0) {
      // skeleton stages: show single muted segment
      html += '<div class="stage-bar-segment" style="width:100%;background:var(--status-not-started);opacity:0.4"></div>';
    } else {
      html += '<div class="stage-bar-segment" style="width:' + pctProven + '%;background:var(--status-proven)"></div>';
      html += '<div class="stage-bar-segment" style="width:' + pctShipped + '%;background:var(--status-shipped)"></div>';
      html += '<div class="stage-bar-segment" style="width:' + pctInProg + '%;background:var(--status-in-progress)"></div>';
      html += '<div class="stage-bar-segment" style="width:' + pctDeferred + '%;background:var(--status-deferred)"></div>';
    }
    html += '  </div>';
    html += '  <div class="stage-bar-count">' + (prog.total === 0 ? '—' : (prog.proven + '/' + prog.total)) + '</div>';
    html += '</div>';
  }
  html += '</div>';

  // Cards row
  var nextStage = null;
  if (activeStage) {
    var foundActive = false;
    for (i = 0; i < STAGES.length; i++) {
      if (foundActive) { nextStage = STAGES[i]; break; }
      if (STAGES[i].id === activeStage.id) foundActive = true;
    }
  }

  html += '<div class="dash-cards">';
  if (activeStage) {
    var ap = computeStageProgress(activeStage);
    html += '<div class="dash-card active">';
    html += '  <div class="dash-card-label">Active stage</div>';
    html += '  <div class="dash-card-title">' + escapeHtml(activeStage.num) + ' — ' + escapeHtml(activeStage.name) + '</div>';
    html += '  <div class="dash-card-meta">' + ap.proven + ' Proven · ' + ap.shipped + ' Shipped · ' + ap.notStarted + ' Not started · ' + (ap.total) + ' total</div>';
    html += '</div>';
  }
  if (nextStage) {
    html += '<div class="dash-card dim">';
    html += '  <div class="dash-card-label">Next stage</div>';
    html += '  <div class="dash-card-title">' + escapeHtml(nextStage.num) + ' — ' + escapeHtml(nextStage.name) + '</div>';
    html += '  <div class="dash-card-meta">' + escapeHtml(nextStage.purpose.substring(0, 110)) + (nextStage.purpose.length > 110 ? '…' : '') + '</div>';
    html += '</div>';
  }
  html += '<div class="dash-card">';
  html += '  <div class="dash-card-label">Deferred items</div>';
  html += '  <div class="dash-card-bignum">' + DEFERRED.length + '</div>';
  html += '  <div class="dash-card-meta">Logged with reason and comes-back-when</div>';
  html += '</div>';
  html += '</div>';

  // Status legend
  html += '<div class="legend">';
  html += '  <h3>Status Legend</h3>';
  html += '  <div class="legend-items">';
  html += '    <span class="legend-item"><span class="legend-dot" style="background:var(--status-not-started)"></span>Not started</span>';
  html += '    <span class="legend-item"><span class="legend-dot" style="background:var(--status-in-progress)"></span>In progress</span>';
  html += '    <span class="legend-item"><span class="legend-dot" style="background:var(--status-shipped)"></span>Shipped (Manual ✓)</span>';
  html += '    <span class="legend-item"><span class="legend-dot" style="background:var(--status-proven)"></span>Proven (Manual ✓ + Audit ✓)</span>';
  html += '    <span class="legend-item"><span class="legend-dot" style="background:var(--status-deferred)"></span><em>Deferred</em></span>';
  html += '  </div>';
  html += '</div>';

  return html;

function renderStages(filter, search) {
  var html = '';
  var i, j;
  var expanded = getExpandedStages();
  if (expanded === null) {
    // first load: expand active stage only
    expanded = [];
    for (i = 0; i < STAGES.length; i++) {
      if (STAGES[i].active) expanded.push(STAGES[i].id);
    }
    setExpandedStages(expanded);
  }

  for (i = 0; i < STAGES.length; i++) {
    var stage = STAGES[i];
    if (filter === 'active' && !stage.active) continue;
    if (filter === 'deferred') {
      // only render this stage if any of its substages is deferred
      var hasDeferred = false;
      for (j = 0; j < (stage.substages || []).length; j++) {
        if (stage.substages[j].deferred) { hasDeferred = true; break; }
      }
      if (!hasDeferred) continue;
    }
    var prog = computeStageProgress(stage);
    var isExpanded = expanded.indexOf(stage.id) !== -1;
    var classes = ['stage-card'];
    if (stage.active) classes.push('active');
    if (stage.stageStatus) classes.push(stage.stageStatus);
    if (isExpanded) classes.push('expanded');

    html += '<article class="' + classes.join(' ') + '" data-stage-id="' + escapeAttr(stage.id) + '">';
    html += '  <div class="stage-head" data-toggle-stage="' + escapeAttr(stage.id) + '">';
    html += '    <div class="stage-num">' + escapeHtml(stage.num) + '</div>';
    html += '    <div>';
    html += '      <div class="stage-name">' + escapeHtml(stage.name) + '</div>';
    html += '      <div class="stage-purpose">' + escapeHtml(stage.purpose) + '</div>';
    html += '    </div>';
    html += '    <div class="stage-progress-mini">';
    if (prog.total === 0) {
      html += '<div style="width:100%;background:var(--status-not-started);opacity:0.4"></div>';
    } else {
      var t = prog.total;
      html += '<div style="width:' + (prog.proven / t * 100) + '%;background:var(--status-proven)"></div>';
      html += '<div style="width:' + (prog.shipped / t * 100) + '%;background:var(--status-shipped)"></div>';
      html += '<div style="width:' + (prog.inProgress / t * 100) + '%;background:var(--status-in-progress)"></div>';
      html += '<div style="width:' + (prog.deferred / t * 100) + '%;background:var(--status-deferred)"></div>';
    }
    html += '    </div>';
    html += '    <div class="chevron">▸</div>';
    html += '  </div>';

    html += '  <div class="stage-body">';
    html += '    <div class="stage-summary">' + escapeHtml(stage.summary) + '</div>';

    if (stage.nonGoals && stage.nonGoals.length) {
      html += '    <div class="stage-meta-block">';
      html += '      <div class="stage-meta-label">Stage-level non-goals</div>';
      html += '      <ul>';
      for (j = 0; j < stage.nonGoals.length; j++) {
        html += '<li>' + escapeHtml(stage.nonGoals[j]) + '</li>';
      }
      html += '      </ul>';
      html += '    </div>';
    }
    if (stage.dependencies) {
      html += '    <div class="stage-meta-block">';
      html += '      <div class="stage-meta-label">Dependencies on prior stages</div>';
      html += '      <p>' + escapeHtml(stage.dependencies) + '</p>';
      html += '    </div>';
    }

    // Skeleton stage: render skeleton view
    if (stage.skeleton) {
      html += '    <div class="stage-meta-block">';
      html += '      <div class="stage-meta-label">Why skeleton only</div>';
      html += '      <p>' + escapeHtml(stage.skeletonReason) + '</p>';
      html += '    </div>';
      if (stage.tentativeSubstages && stage.tentativeSubstages.length) {
        html += '    <div class="stage-meta-block">';
        html += '      <div class="stage-meta-label">Tentative sub-stages</div>';
        html += '      <ul>';
        for (j = 0; j < stage.tentativeSubstages.length; j++) {
          var ts = stage.tentativeSubstages[j];
          html += '<li><strong style="font-family:var(--mono);font-size:11px;letter-spacing:0.1em;color:var(--ink-3);margin-right:8px">' + escapeHtml(ts.num) + '</strong> ' + escapeHtml(ts.name) + '</li>';
        }
        html += '      </ul>';
        html += '    </div>';
      }
      if (stage.openQuestions && stage.openQuestions.length) {
        html += '    <div class="stage-meta-block">';
        html += '      <div class="stage-meta-label">Open questions</div>';
        html += '      <ul>';
        for (j = 0; j < stage.openQuestions.length; j++) {
          html += '<li>' + escapeHtml(stage.openQuestions[j]) + '</li>';
        }
        html += '      </ul>';
        html += '    </div>';
      }
    } else if (stage.substages && stage.substages.length > 0) {
      // Real sub-stage list
      html += '    <div class="substage-list">';
      for (j = 0; j < stage.substages.length; j++) {
        var sub = stage.substages[j];
        if (search && !subMatchesSearch(sub, search)) continue;
        if (filter === 'deferred' && !sub.deferred) continue;
        html += renderSubstage(sub, stage);
      }
      html += '    </div>';
    }

    html += '  </div>';
    html += '</article>';
  }
  return html;
}

function subMatchesSearch(sub, q) {
  if (!q) return true;
  q = q.toLowerCase();
  if (sub.name.toLowerCase().indexOf(q) !== -1) return true;
  if (sub.id.toLowerCase().indexOf(q) !== -1) return true;
  if (sub.num && sub.num.toLowerCase().indexOf(q) !== -1) return true;
  if (sub.purpose && sub.purpose.toLowerCase().indexOf(q) !== -1) return true;
  return false;
}

function renderSubstage(sub, stage) {
  var html = '';
  var status = computeSubstageStatus(sub);
  var manual = getManual(sub.id);
  var audit = getAudit(sub.id);
  var notes = getNotes(sub.id);
  var manualTs = ls('praxis_roadmap_manual_ts_' + sub.id, '');
  var auditTs = ls('praxis_roadmap_audit_ts_' + sub.id, '');

  var classes = ['substage'];
  if (sub.deferred) classes.push('deferred');
  // expanded: track per substage in localStorage too? Keep simple: collapse by default
  var subExpanded = ls('praxis_roadmap_sub_exp_' + sub.id, false);
  if (subExpanded) classes.push('expanded');

  html += '<div class="' + classes.join(' ') + '" data-sub-id="' + escapeAttr(sub.id) + '">';
  html += '  <div class="substage-head" data-toggle-sub="' + escapeAttr(sub.id) + '">';
  html += '    <div>';
  html += '      <div class="substage-id">' + escapeHtml(sub.num || sub.id) + '</div>';
  html += '      <div class="substage-name">' + escapeHtml(sub.name) + '</div>';
  html += '    </div>';
  html += '    <div class="substage-checks" data-stop-toggle>';
  html += '      <span class="status-badge status-' + status + '">' + escapeHtml(statusLabel(status)) + '</span>';
  html += '      <label class="check-pill"><input type="checkbox" data-check="manual" data-sub="' + escapeAttr(sub.id) + '"' + (manual ? ' checked' : '') + '> Manual</label>';
  html += '      <label class="check-pill"><input type="checkbox" data-check="audit" data-sub="' + escapeAttr(sub.id) + '"' + (audit ? ' checked' : '') + '> Audit</label>';
  html += '    </div>';
  html += '    <div class="chevron">▸</div>';
  html += '  </div>';

  html += '  <div class="substage-body">';

  // 3 — dependencies confirmation
  html += renderField('Dependencies', escapeHtml(sub.depConfirm || '—'));
  // 4 — purpose
  html += renderField('Purpose', escapeHtml(sub.purpose));
  // 5 — scope
  html += renderFieldList('Scope', sub.scope);
  // 6 — non-goals
  html += renderFieldList('Non-goals', sub.nonGoals);
  // 7 — subsystems involved
  html += renderSubsystemChips('Subsystems involved', sub.subsystems);
  // 8 — files (prominent)
  html += '<div class="field-block">';
  html += '  <div class="field-label">Files likely to change</div>';
  html += '  <div class="field-files"><ul>';
  if (sub.files && sub.files.length) {
    var fi;
    for (fi = 0; fi < sub.files.length; fi++) {
      html += '<li>' + escapeHtml(sub.files[fi]) + '</li>';
    }
  } else {
    html += '<li><em>—</em></li>';
  }
  html += '  </ul></div>';
  html += '</div>';
  // 9 — acceptance
  html += renderFieldList('Acceptance criteria', sub.acceptance);
  // 10 — evidence
  html += '<div class="field-block">';
  html += '  <div class="field-label">Evidence</div>';
  html += '  <div class="field-evidence"><ul>';
  if (sub.evidence && sub.evidence.length) {
    var ei;
    for (ei = 0; ei < sub.evidence.length; ei++) {
      html += '<li>' + escapeHtml(sub.evidence[ei]) + '</li>';
    }
  }
  html += '  </ul></div>';
  html += '</div>';
  // 11 — rollback
  html += renderField('Rollback / cleanup', escapeHtml(sub.rollback || '—'));
  // 12 — risks
  html += renderFieldList('Risks and failure modes', sub.risks);
  // 13 — manual check status
  html += '<div class="field-block">';
  html += '  <div class="field-label">Manual check</div>';
  html += '  <div class="field-value">' + (manual ? 'Ticked' : 'Not yet ticked') + '</div>';
  if (manual && manualTs) {
    html += '  <div class="check-status-line">Last set: ' + escapeHtml(tsString(manualTs)) + '</div>';
  }
  html += '</div>';
  // 14 — audit check status
  html += '<div class="field-block">';
  html += '  <div class="field-label">Audit check</div>';
  html += '  <div class="field-value">' + (audit ? 'Ticked' : 'Not yet ticked') + '</div>';
  if (audit && auditTs) {
    html += '  <div class="check-status-line">Last set: ' + escapeHtml(tsString(auditTs)) + '</div>';
  }
  html += '</div>';
  // 15 — audit notes
  html += '<div class="field-block">';
  html += '  <div class="field-label">Audit notes</div>';
  html += '  <textarea class="notes-textarea" data-notes="' + escapeAttr(sub.id) + '" placeholder="Audit notes — what passed, what surprised you, what to flag for the next reviewer.">' + escapeHtml(notes) + '</textarea>';
  html += '</div>';
  // 16 — prompt (full operational prompt for developed sub-stages,
  //        skeleton-only fallback for tentative/skeleton entries)
  var assembledPrompt = buildFullPrompt(sub, stage);
  if (assembledPrompt) {
    var fullyDeveloped = isSubFullyDeveloped(sub);
    var promptLabel = fullyDeveloped ? 'Operational prompt' : 'Prompt skeleton';
    var promptId = 'prompt-' + sub.id;
    var promptExpanded = ls('praxis_roadmap_prompt_exp_' + sub.id, false);
    html += '<div class="field-block">';
    html += '  <div class="prompt-block' + (promptExpanded ? ' expanded' : '') + '" data-prompt-id="' + escapeAttr(sub.id) + '">';
    html += '    <div class="prompt-block-head" data-toggle-prompt="' + escapeAttr(sub.id) + '">';
    html += '      <span class="prompt-block-label">' + escapeHtml(promptLabel) + '</span>';
    html += '      <span class="prompt-block-actions">';
    html += '        <button class="copy-btn" data-copy-prompt="' + escapeAttr(sub.id) + '">Copy</button>';
    html += '        <span class="chevron">▸</span>';
    html += '      </span>';
    html += '    </div>';
    html += '    <div class="prompt-block-body" id="' + promptId + '">' + escapeHtml(assembledPrompt) + '</div>';
    html += '  </div>';
    html += '</div>';
  }

  html += '  </div>'; // .substage-body
  html += '</div>'; // .substage
  return html;
}

function renderField(label, valueHtml) {
  return '<div class="field-block"><div class="field-label">' + escapeHtml(label) + '</div><div class="field-value"><p>' + valueHtml + '</p></div></div>';
}

function renderFieldList(label, list) {
  if (!list || !list.length) {
    return '<div class="field-block"><div class="field-label">' + escapeHtml(label) + '</div><div class="field-value"><p><em>—</em></p></div></div>';
  }
  var html = '<div class="field-block"><div class="field-label">' + escapeHtml(label) + '</div><div class="field-value"><ul>';
  var i;
  for (i = 0; i < list.length; i++) {
    html += '<li>' + escapeHtml(list[i]) + '</li>';
  }
  html += '</ul></div></div>';
  return html;
}

function renderSubsystemChips(label, ids) {
  if (!ids || !ids.length) {
    return '<div class="field-block"><div class="field-label">' + escapeHtml(label) + '</div><div class="field-value"><p><em>—</em></p></div></div>';
  }
  var html = '<div class="field-block"><div class="field-label">' + escapeHtml(label) + '</div><div class="subsystem-chips">';
  var i;
  for (i = 0; i < ids.length; i++) {
    var sys = findSubsystemById(ids[i]);
    var name = sys ? sys.name : ids[i];
    html += '<span class="subsystem-chip" data-jump-subsystem="' + escapeAttr(ids[i]) + '">' + escapeHtml(name) + '</span>';
  }
  html += '</div></div>';
  return html;
}

function renderTimeline() {
  var html = '';
  var i;
  var months = TIMELINE_MONTHS;
  html += '<div class="timeline-wrap">';
  html += '<div class="timeline">';

  // months row
  html += '<div class="timeline-months">';
  html += '<div></div>';
  for (i = 0; i < months.length; i++) {
    var cls = 'timeline-month';
    if (i === TIMELINE_NOW_INDEX) cls += ' current';
    html += '<div class="' + cls + '">' + months[i] + ' 2026</div>';
  }
  html += '</div>';

  // Each band
  for (i = 0; i < TIMELINE_BANDS.length; i++) {
    var band = TIMELINE_BANDS[i];
    var stage = findStageById(band.stageId);
    var name = stage ? stage.num + ' — ' + stage.name : band.label;
    var totalMonths = months.length - 1; // 6 columns of width
    // band.start can be negative (Stage 1 before "now"); clip to 0..totalMonths
    var clipStart = band.start < 0 ? 0 : band.start;
    var clipEnd = band.end > totalMonths ? totalMonths : band.end;
    var leftPct = (clipStart / totalMonths) * 100;
    var widthPct = ((clipEnd - clipStart) / totalMonths) * 100;
    var statusColor;
    var status = computeStageProgress(stage || {});
    var stageStatus = stage && stage.stageStatus ? stage.stageStatus : band.status;
    if (stage && stage.id === 's2') stageStatus = 'in-progress';
    statusColor = statusColorVar(stageStatus);

    html += '<div class="timeline-row">';
    html += '  <div class="timeline-label">';
    html += '    <span class="num">' + escapeHtml(stage ? stage.num : '') + '</span>';
    html += escapeHtml(stage ? stage.name : band.label);
    html += '  </div>';
    html += '  <div class="timeline-track">';
    var cellIdx;
    for (cellIdx = 0; cellIdx < months.length - 1; cellIdx++) {
      html += '<div class="timeline-track-cell"></div>';
    }
    html += '    <div class="timeline-band" style="left:' + leftPct + '%;width:' + widthPct + '%;background:' + statusColor + '" title="' + escapeAttr(name + ' · ' + statusLabel(stageStatus)) + '">';
    html += escapeHtml(statusLabel(stageStatus));
    html += '    </div>';
    if (i === 0) {
      // place "now" line on the first row, but actually it should span all rows; render once at bottom
    }
    html += '  </div>';
    html += '</div>';
  }

  // The "now" marker — overlaid via absolute on the wrap
  html += '</div>';

  // Now marker (separate so it can overlay)
  var nowOffsetPct = (TIMELINE_NOW_INDEX / (months.length - 1)) * 100;
  // The track region starts after the 220px label column. We place the line by re-rendering
  // an absolutely-positioned overlay div whose left is computed from the track.
  html += '<div style="position:relative;height:0;margin-top:-' + (TIMELINE_BANDS.length * 56 + 4) + 'px;pointer-events:none">';
  html += '  <div style="position:absolute;left:220px;right:0;top:24px;bottom:0;height:' + (TIMELINE_BANDS.length * 56) + 'px">';
  html += '    <div style="position:absolute;top:0;bottom:0;left:' + nowOffsetPct + '%;width:2px;background:var(--gold);z-index:5">';
  html += '      <div style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);background:var(--parchment-2);padding:0 6px;white-space:nowrap">Now</div>';
  html += '    </div>';
  html += '  </div>';
  html += '</div>';

  html += '<div class="timeline-note">Illustrative arc, not a forecast. Duration estimates: Stage 2 is 4–6 weeks; Stage 2.5 is 2–3 weeks; Stage 3 is 6–8 weeks; Stage 4 is 3–4 weeks.</div>';
  html += '</div>';
  return html;
}

function renderSubsystems() {
  var html = '';
  var i, j, k;

  // Build the matrix: rows = subsystems, cols = sub-stages grouped by stage
  // Only sub-stages from non-skeleton stages with substages
  var allSubs = [];
  for (i = 0; i < STAGES.length; i++) {
    if (STAGES[i].substages && STAGES[i].substages.length) {
      for (j = 0; j < STAGES[i].substages.length; j++) {
        allSubs.push({ stage: STAGES[i], sub: STAGES[i].substages[j] });
      }
    }
  }

  // Matrix header
  html += '<h2 class="dash-section-title" style="margin-top:0">Subsystem matrix</h2>';
  html += '<p style="font-family:var(--display);font-style:italic;color:var(--ink-3);margin:0 0 20px;font-size:16px">Rows are subsystems. Columns are sub-stages with detail. Filled cells show which subsystem each sub-stage touches; cell color reflects sub-stage status. Skeleton stages are surfaced in the list below the matrix.</p>';

  html += '<div class="matrix-wrap">';
  // Compute grid: 1 row-head col + N substage cols
  var cols = allSubs.length;
  var gridTpl = 'minmax(180px, 220px) repeat(' + cols + ', minmax(38px, 1fr))';
  html += '<div class="matrix" style="grid-template-columns:' + gridTpl + '">';

  // Row 0: corner + stage group headers (spanning their substages)
  html += '<div class="matrix-corner">Subsystem</div>';
  // Stage group headers — render each substage's stage-group cell, but visually we
  // draw a band only on the first substage of each stage. To keep grid simple,
  // we render one cell per substage with the stage label, which hands off
  // visual grouping via the gold underline on the column header below.
  for (k = 0; k < allSubs.length; k++) {
    html += '<div class="matrix-stage-group">' + escapeHtml(allSubs[k].stage.num.replace('Stage ', '')) + '</div>';
  }

  // Row 1: column headers (sub-stage names)
  html += '<div class="matrix-corner" style="border-top:none">&nbsp;</div>';
  for (k = 0; k < allSubs.length; k++) {
    html += '<div class="matrix-col-head" data-jump-sub="' + escapeAttr(allSubs[k].sub.id) + '" title="' + escapeAttr(allSubs[k].sub.num + ' ' + allSubs[k].sub.name) + '">' + escapeHtml(allSubs[k].sub.num) + ' ' + escapeHtml(allSubs[k].sub.name) + '</div>';
  }

  // Subsystem rows
  for (i = 0; i < SUBSYSTEMS.length; i++) {
    var sys = SUBSYSTEMS[i];
    html += '<div class="matrix-row-head">' + escapeHtml(sys.name) + '</div>';
    for (k = 0; k < allSubs.length; k++) {
      var pair = allSubs[k];
      var touched = sys.touchedBy.indexOf(pair.sub.id) !== -1;
      if (touched) {
        var status = computeSubstageStatus(pair.sub);
        var color = statusColorVar(status);
        html += '<div class="matrix-cell active" data-jump-sub="' + escapeAttr(pair.sub.id) + '" style="background:' + color + ';opacity:0.85"><span class="tip">' + escapeHtml(pair.sub.num + ' · ' + pair.sub.name + ' · ' + statusLabel(status)) + '</span></div>';
      } else {
        html += '<div class="matrix-cell"></div>';
      }
    }
  }

  html += '</div>'; // .matrix
  html += '</div>'; // .matrix-wrap

  // Subsystem detail list
  html += '<div class="subsystem-list-section">';
  html += '<h2>All subsystems</h2>';
  for (i = 0; i < SUBSYSTEMS.length; i++) {
    var s = SUBSYSTEMS[i];
    var touchedLabel = s.touchedBy.length === 0 ? 'Not touched in current scope' : 'Touched by: ' + s.touchedBy.join(', ');
    html += '<div class="subsystem-card">';
    html += '  <div class="subsystem-card-head">';
    html += '    <h3 class="subsystem-card-name">' + escapeHtml(s.name) + '</h3>';
    html += '    <span class="subsystem-card-touched">' + escapeHtml(touchedLabel) + '</span>';
    html += '  </div>';
    html += '  <p class="subsystem-card-def">' + escapeHtml(s.definition) + '</p>';
    html += '  <div class="subsystem-card-meta"><strong>Current state:</strong> ' + escapeHtml(s.currentState) + '</div>';
    html += '  <div class="subsystem-card-meta"><strong>Principles served:</strong> ' + escapeHtml(s.principlesServed) + '</div>';
    html += '</div>';
  }
  html += '</div>';

  // Deferred items log
  html += '<div class="deferred-section">';
  html += '<h2>Deferred items</h2>';
  html += '<p class="lead">Things explicitly punted, with the reason and the condition under which they come back.</p>';
  for (i = 0; i < DEFERRED.length; i++) {
    var di = DEFERRED[i];
    html += '<div class="deferred-item">';
    html += '  <div>';
    html += '    <p class="deferred-name">' + escapeHtml(di.name) + '</p>';
    html += '    <div class="deferred-meta">Deferred ' + escapeHtml(di.dateDeferred) + '</div>';
    html += '    <p class="deferred-reason">' + escapeHtml(di.reason) + '</p>';
    html += '  </div>';
    html += '  <div class="deferred-when">Comes back: ' + escapeHtml(di.comesBackWhen) + '</div>';
    html += '</div>';
  }
  html += '</div>';

  return html;
}

// =====================================================================
// RENDER — orchestration
// =====================================================================

function render() {
  var view = getView();
  var filter = document.getElementById('filterSelect').value || 'all';
  var search = (document.getElementById('searchInput').value || '').trim();

  document.getElementById('view-dashboard').innerHTML = renderDashboard();
  document.getElementById('view-stages').innerHTML = renderStages(filter, search);
  document.getElementById('view-timeline').innerHTML = renderTimeline();
  document.getElementById('view-subsystems').innerHTML = renderSubsystems();

  // Set active view
  var views = document.querySelectorAll('.view');
  var i;
  for (i = 0; i < views.length; i++) {
    views[i].classList.remove('active');
  }
  var activeEl = document.getElementById('view-' + view);
  if (activeEl) activeEl.classList.add('active');

  // Set active button
  var btns = document.querySelectorAll('#viewSwitcher button');
  for (i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute('data-view') === view) btns[i].classList.add('active');
    else btns[i].classList.remove('active');
  }
}

// =====================================================================
// EVENT WIRING
// =====================================================================

function onClick(e) {
  var t = e.target;

  // Don't propagate from inside check pills / inputs
  if (t.closest('[data-stop-toggle]') && t.tagName !== 'BUTTON') {
    // Allow checkbox click to fire normally; don't toggle stage/sub
  }

  // View switcher
  var viewBtn = t.closest('[data-view]');
  if (viewBtn && viewBtn.parentNode.id === 'viewSwitcher') {
    var v = viewBtn.getAttribute('data-view');
    setView(v);
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // Toggle stage
  var stageHead = t.closest('[data-toggle-stage]');
  if (stageHead) {
    var sid = stageHead.getAttribute('data-toggle-stage');
    var expanded = getExpandedStages() || [];
    var idx = expanded.indexOf(sid);
    if (idx === -1) expanded.push(sid);
    else expanded.splice(idx, 1);
    setExpandedStages(expanded);
    render();
    return;
  }

  // Toggle substage
  var subHead = t.closest('[data-toggle-sub]');
  if (subHead && !t.closest('[data-stop-toggle]')) {
    var subId = subHead.getAttribute('data-toggle-sub');
    var cur = ls('praxis_roadmap_sub_exp_' + subId, false);
    sv('praxis_roadmap_sub_exp_' + subId, !cur);
    render();
    return;
  }

  // Toggle prompt block
  var promptHead = t.closest('[data-toggle-prompt]');
  if (promptHead) {
    // Don't toggle if user clicked the copy button
    if (t.closest('[data-copy-prompt]')) {
      // Let copy handler run
    } else {
      var pid = promptHead.getAttribute('data-toggle-prompt');
      var pcur = ls('praxis_roadmap_prompt_exp_' + pid, false);
      sv('praxis_roadmap_prompt_exp_' + pid, !pcur);
      render();
      return;
    }
  }

  // Copy prompt
  var copyBtn = t.closest('[data-copy-prompt]');
  if (copyBtn) {
    e.stopPropagation();
    var copySubId = copyBtn.getAttribute('data-copy-prompt');
    var info = findSubstageById(copySubId);
    if (info) {
      var text = buildFullPrompt(info.sub, info.stage);
      if (!text) text = info.sub.promptSkeleton || '';
      var ok = false;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function() {
            copyBtn.textContent = 'Copied';
            copyBtn.classList.add('copied');
            setTimeout(function() {
              copyBtn.textContent = 'Copy';
              copyBtn.classList.remove('copied');
            }, 1500);
          }, function() {
            fallbackCopy(text, copyBtn);
          });
          ok = true;
        }
      } catch (err) { ok = false; }
      if (!ok) fallbackCopy(text, copyBtn);
    }
    return;
  }

  // Jump-to from dashboard CTA
  var jumpStage = t.closest('[data-jump-stage]');
  if (jumpStage) {
    var jsId = jumpStage.getAttribute('data-jump-stage');
    setView('stages');
    var expandedJump = getExpandedStages() || [];
    if (expandedJump.indexOf(jsId) === -1) {
      expandedJump.push(jsId);
      setExpandedStages(expandedJump);
    }
    render();
    setTimeout(function() {
      var card = document.querySelector('[data-stage-id="' + jsId + '"]');
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
    return;
  }

  // Jump-to substage (from matrix or chips)
  var jumpSub = t.closest('[data-jump-sub]');
  if (jumpSub) {
    var jsubId = jumpSub.getAttribute('data-jump-sub');
    var info2 = findSubstageById(jsubId);
    if (info2) {
      setView('stages');
      var expandedJ2 = getExpandedStages() || [];
      if (expandedJ2.indexOf(info2.stage.id) === -1) {
        expandedJ2.push(info2.stage.id);
        setExpandedStages(expandedJ2);
      }
      sv('praxis_roadmap_sub_exp_' + jsubId, true);
      render();
      setTimeout(function() {
        var subEl = document.querySelector('[data-sub-id="' + jsubId + '"]');
        if (subEl) subEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
      return;
    }
  }

  // Jump to subsystem (chip click → switch to subsystems view)
  var jumpSys = t.closest('[data-jump-subsystem]');
  if (jumpSys) {
    setView('subsystems');
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
}

function fallbackCopy(text, btn) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
  btn.textContent = 'Copied';
  btn.classList.add('copied');
  setTimeout(function() {
    btn.textContent = 'Copy';
    btn.classList.remove('copied');
  }, 1500);
}

function onChange(e) {
  var t = e.target;
  if (t.matches('[data-check]')) {
    var subId = t.getAttribute('data-sub');
    var which = t.getAttribute('data-check');
    if (which === 'manual') setManual(subId, t.checked);
    else if (which === 'audit') setAudit(subId, t.checked);
    render();
    return;
  }
  if (t.matches('[data-notes]')) {
    var nSubId = t.getAttribute('data-notes');
    setNotes(nSubId, t.value);
    return;
  }
  if (t.id === 'filterSelect') {
    render();
    return;
  }
}

function onInput(e) {
  if (e.target.id === 'searchInput') {
    // Lightweight: re-render stages view only on search
    document.getElementById('view-stages').innerHTML = renderStages(
      document.getElementById('filterSelect').value || 'all',
      (e.target.value || '').trim()
    );
    // If we're not on stages, switch
    if (getView() !== 'stages' && (e.target.value || '').trim().length > 0) {
      setView('stages');
      render();
    }
  }
}

// =====================================================================
// INIT
// =====================================================================

function init() {
  document.addEventListener('click', onClick);
  document.addEventListener('change', onChange);
  document.addEventListener('input', onInput);
  render();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
