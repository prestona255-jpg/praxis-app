<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMinYMin slice">
  <!--
    Praxis Stage 5.2 - wheat-field.svg (1a-redraw)
    Drawn at FULL STRENGTH. CSS opacity (var(--field-presence)) dims the
    field at mount; this asset never carries opacity, fill-opacity, rgba,
    or alpha gradient stops. 28 wheat stalks across FIVE distinct forms
    (wA tall-full / wB medium / wC short-compact / wD sparse-young /
    wE nearly-bare-grass) so the field is irregular rather than a stamped
    motif. Stalks vary in length (18-40), dark-seed count (3-11), head
    density, and stroke width (1.4-1.7) -- not one shape scaled.
    Density biased toward the upper-left, peaking near the A1.1 light
    anchor at (192, 72). Single warm-gold family (stalk #a87a2e,
    seed #d4972a, highlight #f0c46a). viewBox 1600 x 900;
    preserveAspectRatio xMinYMin slice anchors the upper-left and slices
    on overflow.
  -->
  <defs>
    <!-- Form A: tall mature wheat, full ear (11 dark + 3 light seeds). -->
    <symbol id="wA" overflow="visible">
      <line x1="0" y1="0" x2="0" y2="-40" stroke="#a87a2e" stroke-width="1.7" stroke-linecap="round"/>
      <g fill="#d4972a">
        <ellipse cx="-2.8" cy="-26" rx="2" ry="4.2" transform="rotate(-22 -2.8 -26)"/>
        <ellipse cx="2.8" cy="-26" rx="2" ry="4.2" transform="rotate(22 2.8 -26)"/>
        <ellipse cx="-3" cy="-33" rx="2" ry="4.2" transform="rotate(-22 -3 -33)"/>
        <ellipse cx="3" cy="-33" rx="2" ry="4.2" transform="rotate(22 3 -33)"/>
        <ellipse cx="-2.8" cy="-40" rx="1.9" ry="4" transform="rotate(-20 -2.8 -40)"/>
        <ellipse cx="2.8" cy="-40" rx="1.9" ry="4" transform="rotate(20 2.8 -40)"/>
        <ellipse cx="-2.5" cy="-47" rx="1.7" ry="3.7" transform="rotate(-18 -2.5 -47)"/>
        <ellipse cx="2.5" cy="-47" rx="1.7" ry="3.7" transform="rotate(18 2.5 -47)"/>
        <ellipse cx="-1.8" cy="-53" rx="1.5" ry="3.2" transform="rotate(-14 -1.8 -53)"/>
        <ellipse cx="1.8" cy="-53" rx="1.5" ry="3.2" transform="rotate(14 1.8 -53)"/>
        <ellipse cx="0" cy="-58" rx="1.3" ry="2.8"/>
      </g>
      <g fill="#f0c46a">
        <ellipse cx="0" cy="-30" rx="1.3" ry="2.8"/>
        <ellipse cx="0" cy="-37" rx="1.3" ry="2.8"/>
        <ellipse cx="0" cy="-45" rx="1.2" ry="2.5"/>
      </g>
    </symbol>

    <!-- Form B: medium standard wheat, 7 dark + 2 light seeds. -->
    <symbol id="wB" overflow="visible">
      <line x1="0" y1="0" x2="0" y2="-28" stroke="#a87a2e" stroke-width="1.6" stroke-linecap="round"/>
      <g fill="#d4972a">
        <ellipse cx="-2.5" cy="-30" rx="1.8" ry="4" transform="rotate(-22 -2.5 -30)"/>
        <ellipse cx="2.5" cy="-30" rx="1.8" ry="4" transform="rotate(22 2.5 -30)"/>
        <ellipse cx="-2.7" cy="-37" rx="1.8" ry="4" transform="rotate(-22 -2.7 -37)"/>
        <ellipse cx="2.7" cy="-37" rx="1.8" ry="4" transform="rotate(22 2.7 -37)"/>
        <ellipse cx="-2" cy="-44" rx="1.5" ry="3.4" transform="rotate(-18 -2 -44)"/>
        <ellipse cx="2" cy="-44" rx="1.5" ry="3.4" transform="rotate(18 2 -44)"/>
        <ellipse cx="0" cy="-49" rx="1.3" ry="2.7"/>
      </g>
      <g fill="#f0c46a">
        <ellipse cx="0" cy="-34" rx="1.2" ry="2.6"/>
        <ellipse cx="0" cy="-41" rx="1.1" ry="2.4"/>
      </g>
    </symbol>

    <!-- Form C: short stalk, compact dense head (8 dark + 2 light seeds). -->
    <symbol id="wC" overflow="visible">
      <line x1="0" y1="0" x2="0" y2="-18" stroke="#a87a2e" stroke-width="1.5" stroke-linecap="round"/>
      <g fill="#d4972a">
        <ellipse cx="-2.5" cy="-20" rx="1.7" ry="3.5" transform="rotate(-25 -2.5 -20)"/>
        <ellipse cx="2.5" cy="-20" rx="1.7" ry="3.5" transform="rotate(25 2.5 -20)"/>
        <ellipse cx="-2.7" cy="-25" rx="1.7" ry="3.5" transform="rotate(-25 -2.7 -25)"/>
        <ellipse cx="2.7" cy="-25" rx="1.7" ry="3.5" transform="rotate(25 2.7 -25)"/>
        <ellipse cx="-2.5" cy="-30" rx="1.5" ry="3" transform="rotate(-22 -2.5 -30)"/>
        <ellipse cx="2.5" cy="-30" rx="1.5" ry="3" transform="rotate(22 2.5 -30)"/>
        <ellipse cx="-1.5" cy="-34" rx="1.3" ry="2.7" transform="rotate(-15 -1.5 -34)"/>
        <ellipse cx="1.5" cy="-34" rx="1.3" ry="2.7" transform="rotate(15 1.5 -34)"/>
        <ellipse cx="0" cy="-37" rx="1.2" ry="2.5"/>
      </g>
      <g fill="#f0c46a">
        <ellipse cx="0" cy="-23" rx="1.2" ry="2.5"/>
        <ellipse cx="0" cy="-29" rx="1.1" ry="2.3"/>
      </g>
    </symbol>

    <!-- Form D: medium stalk, sparse young head (4 dark + 1 light seed). -->
    <symbol id="wD" overflow="visible">
      <line x1="0" y1="0" x2="0" y2="-32" stroke="#a87a2e" stroke-width="1.5" stroke-linecap="round"/>
      <g fill="#d4972a">
        <ellipse cx="-2.3" cy="-34" rx="1.6" ry="3.6" transform="rotate(-22 -2.3 -34)"/>
        <ellipse cx="2.3" cy="-34" rx="1.6" ry="3.6" transform="rotate(22 2.3 -34)"/>
        <ellipse cx="-2.3" cy="-40" rx="1.5" ry="3.4" transform="rotate(-20 -2.3 -40)"/>
        <ellipse cx="2.3" cy="-40" rx="1.5" ry="3.4" transform="rotate(20 2.3 -40)"/>
        <ellipse cx="0" cy="-45" rx="1.3" ry="2.8"/>
      </g>
      <g fill="#f0c46a">
        <ellipse cx="0" cy="-37" rx="1.1" ry="2.4"/>
      </g>
    </symbol>

    <!-- Form E: nearly bare grass-like, tall thin stalk + tiny tip. -->
    <symbol id="wE" overflow="visible">
      <line x1="0" y1="0" x2="0" y2="-38" stroke="#a87a2e" stroke-width="1.4" stroke-linecap="round"/>
      <g fill="#d4972a">
        <ellipse cx="-1.8" cy="-40" rx="1.3" ry="3" transform="rotate(-25 -1.8 -40)"/>
        <ellipse cx="1.8" cy="-40" rx="1.3" ry="3" transform="rotate(25 1.8 -40)"/>
        <ellipse cx="0" cy="-44" rx="1.2" ry="2.6"/>
      </g>
      <g fill="#f0c46a">
        <ellipse cx="0" cy="-42" rx="1" ry="2.2"/>
      </g>
    </symbol>
  </defs>

  <!-- Upper-left dense (12 stalks); peak density near the (192, 72) anchor. -->
  <use href="#wA" transform="translate(95 145) rotate(-8)"/>
  <use href="#wB" transform="translate(165 165) rotate(4)"/>
  <use href="#wC" transform="translate(245 130) rotate(-5)"/>
  <use href="#wD" transform="translate(135 240) rotate(6)"/>
  <use href="#wB" transform="translate(215 285) rotate(-10)"/>
  <use href="#wA" transform="translate(310 220) rotate(3)"/>
  <use href="#wC" transform="translate(375 175) rotate(-7)"/>
  <use href="#wE" transform="translate(445 310) rotate(8)"/>
  <use href="#wE" transform="translate(305 380) rotate(-4)"/>
  <use href="#wD" transform="translate(505 240) rotate(5)"/>
  <use href="#wB" transform="translate(95 365) rotate(-9)"/>
  <use href="#wA" transform="translate(570 200) rotate(4)"/>

  <!-- Upper-right medium (7 stalks). -->
  <use href="#wC" transform="translate(830 195) rotate(-6)"/>
  <use href="#wB" transform="translate(905 285) rotate(7)"/>
  <use href="#wA" transform="translate(990 215) rotate(-9)"/>
  <use href="#wD" transform="translate(1080 350) rotate(5)"/>
  <use href="#wE" transform="translate(1210 240) rotate(-7)"/>
  <use href="#wC" transform="translate(1350 195) rotate(6)"/>
  <use href="#wB" transform="translate(1490 305) rotate(-4)"/>

  <!-- Lower-left (5 stalks). -->
  <use href="#wD" transform="translate(115 525) rotate(-6)"/>
  <use href="#wC" transform="translate(245 605) rotate(5)"/>
  <use href="#wA" transform="translate(385 555) rotate(-8)"/>
  <use href="#wB" transform="translate(510 685) rotate(7)"/>
  <use href="#wD" transform="translate(665 605) rotate(-4)"/>

  <!-- Lower-right sparse (4 stalks). -->
  <use href="#wE" transform="translate(890 575) rotate(-5)"/>
  <use href="#wC" transform="translate(1075 660) rotate(6)"/>
  <use href="#wA" transform="translate(1295 595) rotate(-7)"/>
  <use href="#wD" transform="translate(1480 695) rotate(4)"/>
</svg>
